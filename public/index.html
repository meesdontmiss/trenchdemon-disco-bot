<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Narrative Coin Scout</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101317;
        color: #e7edf3;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100vw - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 7vw, 52px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 14px;
        color: #aeb9c6;
        font-size: 17px;
        line-height: 1.6;
      }

      code {
        color: #f3c969;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Narrative Coin Scout</h1>
      <p>
        This repository builds successfully on Vercel, but the Discord bot itself is a persistent worker
        process and should be deployed on a worker host such as Render, Railway, Fly.io, or a VPS.
      </p>
      <p>Run the bot with <code>npm run start</code> after building and configuring environment variables.</p>
    </main>
  </body>
</html>
